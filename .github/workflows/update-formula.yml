name: Update Formula

on:
  repository_dispatch:
    types: [update-formula]

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Validate payload
        run: |
          if [ -z "${{ github.event.client_payload.formula }}" ] || \
             [ -z "${{ github.event.client_payload.version }}" ] || \
             [ -z "${{ github.event.client_payload.sha256_macos }}" ] || \
             [ -z "${{ github.event.client_payload.sha256_linux }}" ] || \
             [ -z "${{ github.event.client_payload.tag }}" ] || \
             [ -z "${{ github.event.client_payload.repo }}" ]; then
            echo "::error::Missing required fields in client_payload"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update formula
        env:
          FORMULA: ${{ github.event.client_payload.formula }}
          VERSION: ${{ github.event.client_payload.version }}
          TAG: ${{ github.event.client_payload.tag }}
          REPO: ${{ github.event.client_payload.repo }}
          SHA256_MACOS: ${{ github.event.client_payload.sha256_macos }}
          SHA256_LINUX: ${{ github.event.client_payload.sha256_linux }}
        run: |
          CLASS_NAME="$(echo "$FORMULA" | sed 's/.*/\u&/')"
          FORMULA_FILE="Formula/${FORMULA}.rb"

          cat > "$FORMULA_FILE" <<RUBY
          class ${CLASS_NAME} < Formula
            desc "Midnight Commander-style terminal file manager written in ARO"
            homepage "https://github.com/${REPO}"
            version "${VERSION}"
            license "MIT"

            on_macos do
              depends_on arch: :arm64
              url "https://github.com/${REPO}/releases/download/${TAG}/${FORMULA}-macos-arm64.tar.gz"
              sha256 "${SHA256_MACOS}"
            end

            on_linux do
              url "https://github.com/${REPO}/releases/download/${TAG}/${FORMULA}-linux-amd64.tar.gz"
              sha256 "${SHA256_LINUX}"
            end

            def install
              bin.install "${FORMULA}"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/${FORMULA} --version")
            end
          end
          RUBY

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' "$FORMULA_FILE"

      - name: Commit and push
        env:
          FORMULA: ${{ github.event.client_payload.formula }}
          VERSION: ${{ github.event.client_payload.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "Formula/${FORMULA}.rb"
          if git diff --staged --quiet; then
            echo "No changes to formula"
          else
            git commit -m "chore: update ${FORMULA} to version ${VERSION}"
            git push
          fi
